apiVersion: argoproj.io/v1alpha1
kind: ApplicationSet
metadata:
  name: platform
  namespace: argocd
spec:
  goTemplate: true
  goTemplateOptions: ["missingkey=error"]
  generators:
    - git:
        repoURL: git@github.com:rciliberto/lab-gitops.git
        revision: main
        directories:
          - path: platform/*
  template:
    metadata:
      name: "platform-{{ .path.basename }}"
    spec:
      project: default
      source:
        repoURL: git@github.com:rciliberto/lab-gitops.git
        path: "{{ .path.path }}"
        targetRevision: main
      destination:
        server: https://kubernetes.default.svc
        namespace: argocd
      syncPolicy:
        automated:
          prune: true
          selfHeal: true
        syncOptions:
          - ServerSideApply=true
