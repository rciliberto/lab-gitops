{{- if .Values.validate.enabled }}
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ .Values.validate.name }}
  namespace: {{ .Values.namespace.name }}
spec:
  replicas: 1
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app.kubernetes.io/name: {{ .Values.validate.name }}
  template:
    metadata:
      labels:
        app.kubernetes.io/name: {{ .Values.validate.name }}
        app.kubernetes.io/component: validate-runner
    spec:
      securityContext:
        fsGroup: 1000
      containers:
        - name: runner
          image: "{{ .Values.images.runner.repository }}:{{ .Values.images.runner.tag }}"
          imagePullPolicy: {{ .Values.images.runner.pullPolicy }}
          command: ["/bin/sh", "/config/run-runner.sh"]
          env:
            - name: FORGEJO_INSTANCE_URL
              value: {{ .Values.forgejo.instanceUrl | quote }}
            - name: RUNNER_NAME
              value: {{ .Values.validate.name | quote }}
            - name: RUNNER_LABELS
              value: {{ join "," .Values.validate.labels | quote }}
            - name: RUNNER_CONFIG
              value: /config/validate-config.yml
            - name: DOCKER_HOST
              value: {{ .Values.validate.runnerDockerHost | quote }}
            - name: RUNNER_TOKEN
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.validate.tokenSecretName }}
                  key: {{ .Values.validate.tokenSecretKey }}
          resources:
{{ toYaml .Values.validate.resources | indent 12 }}
          securityContext:
            allowPrivilegeEscalation: false
            runAsNonRoot: true
            runAsUser: 1000
            runAsGroup: 1000
            capabilities:
              drop: ["ALL"]
          volumeMounts:
            - name: config
              mountPath: /config
              readOnly: true
            - name: state
              mountPath: /data
        - name: dind
          image: "{{ .Values.images.dind.repository }}:{{ .Values.images.dind.tag }}"
          imagePullPolicy: {{ .Values.images.dind.pullPolicy }}
          args: ["dockerd", "-H", "tcp://0.0.0.0:2375", "--tls=false"]
          env:
            - name: DOCKER_TLS_CERTDIR
              value: ""
          resources:
{{ toYaml .Values.validate.dind.resources | indent 12 }}
          securityContext:
            privileged: true
          volumeMounts:
            - name: docker-cache
              mountPath: /var/lib/docker
      volumes:
        - name: config
          configMap:
            name: forgejo-runner-config
            defaultMode: 0755
        - name: state
          persistentVolumeClaim:
            claimName: forgejo-runner-validate-state
        - name: docker-cache
          emptyDir: {}
{{- end }}
