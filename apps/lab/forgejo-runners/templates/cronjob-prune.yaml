{{- if and .Values.builder.enabled .Values.prune.enabled }}
apiVersion: batch/v1
kind: CronJob
metadata:
  name: forgejo-runner-image-builder-prune
  namespace: {{ .Values.namespace.name }}
spec:
  schedule: {{ .Values.prune.schedule | quote }}
  successfulJobsHistoryLimit: {{ .Values.prune.successfulJobsHistoryLimit }}
  failedJobsHistoryLimit: {{ .Values.prune.failedJobsHistoryLimit }}
  concurrencyPolicy: Forbid
  jobTemplate:
    spec:
      template:
        metadata:
          labels:
            app.kubernetes.io/name: forgejo-runner-image-builder-prune
            app.kubernetes.io/component: docker-prune
        spec:
          restartPolicy: OnFailure
          containers:
            - name: docker-prune
              image: "{{ .Values.images.dockerCli.repository }}:{{ .Values.images.dockerCli.tag }}"
              imagePullPolicy: {{ .Values.images.dockerCli.pullPolicy }}
              env:
                - name: DOCKER_HOST
                  value: {{ .Values.builder.pruneDockerHost | quote }}
                - name: PRUNE_UNTIL
                  value: {{ .Values.prune.olderThan | quote }}
              command:
                - /bin/sh
                - -ec
                - |
                  docker container prune -f --filter "until=${PRUNE_UNTIL}"
                  docker image prune -af --filter "until=${PRUNE_UNTIL}"
                  docker builder prune -af --filter "until=${PRUNE_UNTIL}"
              resources:
{{ toYaml .Values.prune.resources | indent 16 }}
{{- end }}
