# Sealed secrets are intentionally managed manually.
#
# Before syncing this app, replace this file with SealedSecret resources for:
#
# 1. Secret: forgejo-admin-credentials
#    Namespace: forgejo
#    Required keys:
#      username: Forgejo admin username
#      password: Forgejo admin password
#
# 2. Secret: forgejo-redis-secret
#    Namespace: forgejo
#    Required keys:
#      password: Redis password consumed by the OpsTree Redis resource
#      cache-host: Redis URL for Forgejo cache, DB 1
#      session-provider-config: Redis URL for Forgejo sessions, DB 2
#      queue-conn-str: Redis URL for Forgejo queues, DB 0
#
# Redis URL examples:
#   cache-host: redis://:<password>@redis-standalone.forgejo.svc.cluster.local:6379/1?pool_size=100&idle_timeout=180s
#   session-provider-config: redis://:<password>@redis-standalone.forgejo.svc.cluster.local:6379/2?pool_size=100&idle_timeout=180s
#   queue-conn-str: redis://:<password>@redis-standalone.forgejo.svc.cluster.local:6379/0
