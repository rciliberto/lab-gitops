gitlab:
  global:
    hosts:
      domain: ciliber.to
      gitlab:
        name: code.ciliber.to
        https: true
      registry:
        name: registry.ciliber.to
        https: true

    ingress:
      enabled: false
      configureCertmanager: false

    # External PostgreSQL (CNPG-managed)
    psql:
      host: gitlab-db-rw.gitlab.svc.cluster.local
      port: 5432
      database: gitlabhq_production
      username: gitlab
      password:
        useSecret: true
        secret: gitlab-db-app
        key: password

    # External Redis (OpsTree-managed)
    redis:
      host: redis-standalone.gitlab.svc.cluster.local
      port: 6379
      auth:
        enabled: true
        secret: gitlab-redis-secret
        key: password

    # Disable bundled MinIO
    minio:
      enabled: false

    # Consolidated object storage (Rails components)
    appConfig:
      object_store:
        enabled: true
        connection:
          secret: gitlab-object-storage
          key: connection
      lfs:
        bucket: gitlab-lfs
      artifacts:
        bucket: gitlab-artifacts
      uploads:
        bucket: gitlab-uploads
      packages:
        bucket: gitlab-packages
      dependencyProxy:
        enabled: true
        bucket: gitlab-dependency-proxy
      terraformState:
        enabled: true
        bucket: gitlab-terraform-state
      ciSecureFiles:
        enabled: true
        bucket: gitlab-ci-secure-files
      externalDiffs:
        enabled: true
        bucket: gitlab-external-diffs

    # GitLab Shell SSH
    shell:
      port: 2222

    # SMTP (cluster-internal relay, no auth)
    smtp:
      enabled: true
      address: smtp-relay.smtp-relay.svc.cluster.local
      port: 25
      authentication: ""
      starttls_auto: false
      openssl_verify_mode: "none"
    email:
      from: no-reply@ciliber.to
      display_name: GitLab
      reply_to: no-reply@ciliber.to

    # Root password is auto-generated by the chart into gitlab-initial-root-password
    # Retrieve with: kubectl get secret gitlab-initial-root-password -n gitlab -o jsonpath='{.data.password}' | base64 -d

  # --- Disable all bundled sub-charts ---
  installCertmanager: false
  postgresql:
    install: false
  redis:
    install: false
  nginx-ingress:
    enabled: false
  prometheus:
    install: false
  gitlab-runner:
    install: true
    concurrent: 4
    checkInterval: 5
    runners:
      config: |
        [[runners]]
          name = "kubernetes-runner"
          request_concurrency = 4
          [runners.kubernetes]
            namespace = "gitlab-ci"
            image = "alpine:3.19"
            privileged = false
            cpu_request = "500m"
            memory_request = "1Gi"
            cpu_limit = "8"
            memory_limit = "16Gi"
            pull_policy = ["always"]
            allowed_pull_policies = ["always", "if-not-present"]
            poll_interval = 3
            poll_timeout = 600
          [runners.cache]
            Type = "s3"
            Path = "runner"
            Shared = true
            [runners.cache.s3]
              ServerAddress = "minio.gitlab.svc.cluster.local:80"
              BucketName = "gitlab-runner-cache"
              BucketLocation = "us-east-1"
              Insecure = true
      secret: gitlab-runner-token
      jobNamespace: gitlab-ci
      cache:
        cacheType: s3
        secretName: gitlab-runner-cache-s3
    unregisterRunners: true
    sessionServer:
      enabled: true
      serviceType: ClusterIP
    rbac:
      create: true
      clusterWideAccess: false

  # --- Container Registry ---
  registry:
    enabled: true
    maintenance:
      readonly:
        enabled: true
    database:
      configure: true
      enabled: false
      host: gitlab-registry-db-rw.gitlab.svc.cluster.local
      port: 5432
      user: registry
      name: registry
      password:
        secret: gitlab-registry-db-app
        key: password
      sslmode: disable
      migrations:
        enabled: true
    storage:
      secret: gitlab-registry-storage
      key: config
      redirect:
        disable: true

  # --- Webservice (Puma) ---
  gitlab:
    webservice:
      resources:
        requests:
          cpu: 1
          memory: 2.5G
        limits:
          cpu: 2
          memory: 4G
    sidekiq:
      resources:
        requests:
          cpu: 500m
          memory: 1G
        limits:
          cpu: 2
          memory: 2.5G
    gitaly:
      persistence:
        storageClass: longhorn
        size: 50Gi
    gitlab-shell:
      sshDaemon: gitlab-sshd
      service:
        type: ClusterIP
        internalPort: 2222
    toolbox:
      backups:
        objectStorage:
          config:
            secret: gitlab-backup-storage
            key: config
          bucket: gitlab-backups
