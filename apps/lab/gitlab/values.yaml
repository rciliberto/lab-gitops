gitlab:
  global:
    hosts:
      domain: ciliber.to
      gitlab:
        name: code.ciliber.to
        https: true
      registry:
        name: registry.ciliber.to
        https: true

    ingress:
      enabled: false
      configureCertmanager: false

    # External PostgreSQL (CNPG-managed)
    psql:
      host: gitlab-db-rw.gitlab.svc.cluster.local
      port: 5432
      database: gitlabhq_production
      username: gitlab
      password:
        useSecret: true
        secret: gitlab-db-app
        key: password

    # External Redis (OpsTree-managed)
    redis:
      host: redis-standalone.gitlab.svc.cluster.local
      port: 6379
      auth:
        enabled: true
        secret: gitlab-redis-secret
        key: password

    # Disable bundled MinIO
    minio:
      enabled: false

    # Consolidated object storage (Rails components)
    appConfig:
      object_store:
        enabled: true
        connection:
          secret: gitlab-object-storage
          key: connection
      lfs:
        bucket: gitlab-lfs
      artifacts:
        bucket: gitlab-artifacts
      uploads:
        bucket: gitlab-uploads
      packages:
        bucket: gitlab-packages
      dependencyProxy:
        enabled: true
        bucket: gitlab-dependency-proxy
      terraformState:
        enabled: true
        bucket: gitlab-terraform-state
      ciSecureFiles:
        enabled: true
        bucket: gitlab-ci-secure-files
      externalDiffs:
        enabled: true
        bucket: gitlab-external-diffs

    # GitLab Shell SSH
    shell:
      port: 2222

    # SMTP (cluster-internal relay, no auth)
    smtp:
      enabled: true
      address: smtp-relay.smtp-relay.svc.cluster.local
      port: 25
      authentication: ""
      starttls_auto: false
      openssl_verify_mode: "none"
    email:
      from: no-reply@ciliber.to
      display_name: GitLab
      reply_to: no-reply@ciliber.to

    # Root password is auto-generated by the chart into gitlab-initial-root-password
    # Retrieve with: kubectl get secret gitlab-initial-root-password -n gitlab -o jsonpath='{.data.password}' | base64 -d

  # --- Disable all bundled sub-charts ---
  installCertmanager: false
  postgresql:
    install: false
  redis:
    install: false
  nginx-ingress:
    enabled: false
  prometheus:
    install: false
  gitlab-runner:
    install: true
    runners:
      config: |
        concurrent = 10
        check_interval = 5

        [[runners]]
          name = "kubernetes-runner"
          [runners.kubernetes]
            namespace = "gitlab-ci"
            image = "alpine:3.19"
            privileged = false
            cpu_request = "100m"
            memory_request = "256Mi"
            cpu_limit = "2"
            memory_limit = "4Gi"
            service_account = "gitlab-runner"
            poll_timeout = 600
          [runners.cache]
            Type = "s3"
            Path = "runner"
            Shared = true
            [runners.cache.s3]
              ServerAddress = "minio.gitlab.svc.cluster.local:80"
              BucketName = "gitlab-runner-cache"
              BucketLocation = "us-east-1"
              Insecure = true
      secret: gitlab-runner-token
      jobNamespace: gitlab-ci
    cache:
      secretName: gitlab-runner-cache-s3
    unregisterRunners: false
    rbac:
      create: true
      clusterWideAccess: false

  # --- Container Registry ---
  registry:
    enabled: true
    storage:
      secret: gitlab-registry-storage
      key: config
      redirect:
        disable: true

  # --- GitLab components ---
  gitlab:
    gitaly:
      persistence:
        storageClass: longhorn
        size: 50Gi
    gitlab-shell:
      sshDaemon: gitlab-sshd
      service:
        type: ClusterIP
        internalPort: 2222
    toolbox:
      backups:
        objectStorage:
          config:
            secret: gitlab-backup-storage
            key: config
          bucket: gitlab-backups
