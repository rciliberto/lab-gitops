apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: onedev
  namespace: lab-onedev
  annotations:
    link.argocd.argoproj.io/external-link: https://code.ciliber.to
spec:
  parentRefs:
    - group: gateway.networking.k8s.io
      kind: Gateway
      name: lab-gateway
      namespace: envoy-gateway-system
      sectionName: https-public
  hostnames:
    - code.ciliber.to
  rules:
    - backendRefs:
        - group: ''
          kind: Service
          name: '{{ .Release.Name }}'
          port: 80
          weight: 1
      matches:
        - path:
            type: PathPrefix
            value: /
