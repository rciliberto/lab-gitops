apiVersion: gateway.networking.k8s.io/v1alpha2
kind: TCPRoute
metadata:
  name: onedev-ssh
  namespace: launch-onedev
spec:
  parentRefs:
    - name: lab-gateway
      namespace: envoy-gateway-system
      sectionName: ssh
  rules:
    - backendRefs:
        - name: '{{ .Release.Name }}'
          port: 22