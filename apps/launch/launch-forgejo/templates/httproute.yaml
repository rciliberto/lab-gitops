apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: forgejo
  namespace: launch-forgejo
  annotations:
    link.argocd.argoproj.io/external-link: https://code.launchboats.dev
spec:
  parentRefs:
    - group: gateway.networking.k8s.io
      kind: Gateway
      name: lab-gateway
      namespace: envoy-gateway-system
      sectionName: https-launchboats-dev
  hostnames:
    - code.launchboats.dev
  rules:
    - backendRefs:
        - group: ""
          kind: Service
          name: '{{ .Release.Name }}-http'
          port: 3000
          weight: 1
      matches:
        - path:
            type: PathPrefix
            value: /
