apiVersion: gateway.networking.k8s.io/v1alpha2
kind: TCPRoute
metadata:
  name: forgejo-ssh
  namespace: launch-forgejo
spec:
  parentRefs:
    - name: lab-gateway
      namespace: envoy-gateway-system
      sectionName: ssh
  rules:
    - backendRefs:
        - name: '{{ .Release.Name }}-ssh'
          port: 22
