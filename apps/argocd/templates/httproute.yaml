apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: argocd-server
  namespace: argocd
spec:
  parentRefs:
    - name: lab-gateway
      namespace: envoy-gateway-system
      sectionName: https-lab
  hostnames:
    - argocd.lab.ciliber.to
  rules:
    - backendRefs:
        - name: argocd-server
          port: 80