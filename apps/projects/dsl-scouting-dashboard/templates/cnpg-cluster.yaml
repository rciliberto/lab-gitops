apiVersion: postgresql.cnpg.io/v1
kind: Cluster
metadata:
  name: scouting-dashboard-db
  namespace: dsl-scouting-dashboard
  annotations:
    argocd.argoproj.io/sync-wave: "1"
spec:
  instances: 1
  storage:
    storageClass: longhorn
    size: 10Gi
  bootstrap:
    initdb:
      database: scouting_dashboard
      owner: scouting_dashboard
