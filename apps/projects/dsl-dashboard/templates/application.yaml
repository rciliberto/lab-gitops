apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: dsl-dashboard-app
  namespace: argocd
  annotations:
    argocd.argoproj.io/sync-wave: "2"
spec:
  project: projects
  source:
    repoURL: https://code.ciliber.to/api/v4/projects/1/packages/helm/stable
    chart: dsl-dashboard
    targetRevision: ">=0.0.0-0"
    helm:
      valuesObject:
        imagePullSecrets:
          - name: dsl-dashboard-registry
        databaseSecret:
          name: dsl-dashboard-db-app
          key: uri
  destination:
    server: https://kubernetes.default.svc
    namespace: dsl-dashboard
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
