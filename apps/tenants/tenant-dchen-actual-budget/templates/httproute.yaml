apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: actual-budget-dchen
  namespace: tenant-dchen-actual-budget
  annotations:
    link.argocd.argoproj.io/external-link: https://dc-budget.lab.ciliber.to
spec:
  parentRefs:
    - group: gateway.networking.k8s.io
      kind: Gateway
      name: lab-gateway
      namespace: envoy-gateway-system
      sectionName: https-lab
  hostnames:
    - dc-budget.lab.ciliber.to
  rules:
    - backendRefs:
        - group: ''
          kind: Service
          name: '{{ .Release.Name }}-actualbudget'
          port: 5006
          weight: 1
      matches:
        - path:
            type: PathPrefix
            value: /
---
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: actual-budget-dchen-public
  namespace: tenant-dchen-actual-budget
  annotations:
    link.argocd.argoproj.io/external-link: https://dc-budget.ciliber.to
spec:
  parentRefs:
    - group: gateway.networking.k8s.io
      kind: Gateway
      name: lab-gateway
      namespace: envoy-gateway-system
      sectionName: https-public
  hostnames:
    - dc-budget.ciliber.to
  rules:
    - backendRefs:
        - group: ''
          kind: Service
          name: '{{ .Release.Name }}-actualbudget'
          port: 5006
          weight: 1
      matches:
        - path:
            type: PathPrefix
            value: /