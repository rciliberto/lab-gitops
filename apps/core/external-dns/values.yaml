external-dns:
  fullnameOverride: external-dns-unifi
  logLevel: debug
  provider:
    name: webhook
    webhook:
      image:
        repository: ghcr.io/kashalls/external-dns-unifi-webhook
        tag: v0.8.2 # replace with a versioned release tag
      env:
        - name: UNIFI_HOST
          value: https://10.20.20.1 # replace with the address to your UniFi router
        - name: UNIFI_USER
          valueFrom:
            secretKeyRef:
              name: external-dns-unifi-secret
              key: username
        - name: UNIFI_PASS
          valueFrom:
            secretKeyRef:
              name: external-dns-unifi-secret
              key: password
        - name: LOG_LEVEL
          value: debug
      livenessProbe:
        httpGet:
          path: /healthz
          port: http-webhook
        initialDelaySeconds: 10
        timeoutSeconds: 5
      readinessProbe:
        httpGet:
          path: /readyz
          port: http-webhook
        initialDelaySeconds: 10
        timeoutSeconds: 5
  extraArgs:
    - --ignore-ingress-tls-spec
  policy: sync
  sources: ["ingress", "service", "gateway-httproute"]
  txtOwnerId: default
  txtPrefix: k8s.
  domainFilters: ["ciliber.to", "launchboats.dev", "launch.boats", "dslstats.com"]
