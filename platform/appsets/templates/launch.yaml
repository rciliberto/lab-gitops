apiVersion: argoproj.io/v1alpha1
kind: ApplicationSet
metadata:
  name: launch-apps
  namespace: argocd
spec:
  goTemplate: true
  goTemplateOptions: ["missingkey=error"]
  generators:
    - git:
        repoURL: git@github.com:rciliberto/lab-gitops.git
        revision: main
        directories:
          - path: apps/launch/*
  template:
    metadata:
      name: '{{ `{{ .path.basename }}` }}'
    spec:
      project: launch
      source:
        repoURL: git@github.com:rciliberto/lab-gitops.git
        path: '{{ `{{ .path.path }}` }}'
        targetRevision: main
      destination:
        server: https://kubernetes.default.svc
        namespace: '{{ `{{ .path.basename }}` }}'
      syncPolicy:
        automated:
          prune: true
          selfHeal: true
        syncOptions:
          - ServerSideApply=true
