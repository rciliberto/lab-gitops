apiVersion: argoproj.io/v1alpha1
kind: AppProject
metadata:
  name: launch
  namespace: argocd
spec:
  sourceRepos:
    - git@github.com:rciliberto/lab-gitops.git
  destinations:
    - server: https://kubernetes.default.svc
      namespace: "launch-*"
  clusterResourceWhitelist:
    - group: ""
      kind: Namespace
    # Required by application charts that install service account RBAC
    - group: "rbac.authorization.k8s.io"
      kind: ClusterRole
    - group: "rbac.authorization.k8s.io"
      kind: ClusterRoleBinding
